name: Get Env

on:
  workflow_dispatch:

jobs:
  generate-logs:
    name: Print Env - ${{ matrix.os }} [${{ matrix.runner_owner }}]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # - os: self-hosted
          #   runner_owner: "github-hosted"
          - os: ubuntu-24.04-ppc64le
            runner_owner: "actions-runner-ppc64le"
          # - os: ubuntu-24.04-s390x
          #   runner_owner: "actions-runner-s390x"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Hold runner for 3 minutes
        run: |
          echo "Starting 3-minute timer..."
          sleep 180
          echo "3 minutes complete!"
